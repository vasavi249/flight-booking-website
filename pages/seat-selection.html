<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seat Selection | AeroSky</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body id="seat-page">

    <!-- Navigation -->
    <nav class="navbar glassmorphism scrolled" style="background: var(--bg-secondary);">
        <div class="container">
            <a href="../index.html" class="logo">
                <i class="fa-solid fa-plane"></i> AeroSky
            </a>
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="flights.html">Flights</a></li>
                <li><a href="offers.html">Offers</a></li>
                <li><a href="my-bookings.html">My Bookings</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <div class="container" style="padding-top: 120px; padding-bottom: 5rem; min-height: 80vh;">
        <h2 class="section-title">Select Your Seat</h2>
        
        <div style="display: grid; grid-template-columns: 1fr 300px; gap: 3rem;">
            
            <!-- Seat Map -->
            <div class="plane-layout">
                <div style="text-align: center; margin-bottom: 2rem; color: var(--text-secondary);">Cockpit</div>
                <div id="seat-map">
                    <!-- Seats generated by JS -->
                </div>
            </div>

            <!-- Selection Details -->
            <div>
                <div class="card" style="padding: 2rem; position: sticky; top: 120px;">
                    <h3 style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">Selection Summary</h3>
                    
                    <div style="margin-bottom: 1rem;">
                        <span style="color: var(--text-secondary);">Selected Seats:</span>
                        <div id="selected-seats-list" style="font-weight: bold; margin-top: 0.5rem;">None selected</div>
                    </div>
                    
                    <div style="margin-bottom: 2rem;">
                        <span style="color: var(--text-secondary);">Seat Fare:</span>
                        <div id="seat-price" style="font-weight: bold; font-size: 1.5rem; color: var(--secondary-color); margin-top: 0.5rem;">$0</div>
                    </div>
                    
                    <div style="display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap;">
                        <div style="display: flex; align-items: center; gap: 0.5rem;"><div style="width:15px; height:15px; background:var(--bg-color); border:1px solid var(--secondary-color)"></div> Available</div>
                        <div style="display: flex; align-items: center; gap: 0.5rem;"><div style="width:15px; height:15px; background:var(--border-color)"></div> Occupied</div>
                        <div style="display: flex; align-items: center; gap: 0.5rem;"><div style="width:15px; height:15px; background:var(--secondary-color)"></div> Selected</div>
                    </div>
                    
                    <button id="continue-booking" class="btn btn-primary" style="width: 100%;">Continue to Booking</button>
                </div>
            </div>
            
        </div>
    </div>

    <script src="../script.js"></script>
</body>
</html>
