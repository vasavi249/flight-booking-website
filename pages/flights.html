<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flights | AeroSky</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body id="flights-page">

    <!-- Navigation -->
    <nav class="navbar glassmorphism scrolled" style="background: var(--bg-secondary);">
        <div class="container">
            <a href="../index.html" class="logo">
                <i class="fa-solid fa-plane"></i> AeroSky
            </a>
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="flights.html" class="active">Flights</a></li>
                <li><a href="offers.html">Offers</a></li>
                <li><a href="my-bookings.html">My Bookings</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="nav-actions">
                <button class="theme-toggle" aria-label="Toggle Dark Mode">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <button class="hamburger" aria-label="Menu">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="container" style="padding-top: 120px; padding-bottom: 5rem; min-height: 80vh;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h2>Available Flights</h2>
            <div>
                <select id="sort-flights" style="padding: 0.5rem 1rem; border-radius: 5px; border: 1px solid var(--border-color); background: var(--bg-secondary); color: var(--text-primary);">
                    <option value="">Sort By</option>
                    <option value="price-low">Lowest Price</option>
                    <option value="price-high">Highest Price</option>
                </select>
            </div>
        </div>

        <!-- Filter sidebar & Flights List Layout -->
        <div style="display: grid; grid-template-columns: 250px 1fr; gap: 2rem;">
            <!-- Sidebar -->
            <aside>
                <div class="card" style="padding: 1.5rem;">
                    <h3 style="margin-bottom: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">Filters</h3>
                    
                    <div style="margin-bottom: 1.5rem;">
                        <h4 style="margin-bottom: 0.5rem; font-size: 1rem;">Stops</h4>
                        <label style="display: block; margin-bottom: 0.3rem;"><input type="checkbox" data-filter="stops" value="0"> Non-Stop</label>
                        <label style="display: block; margin-bottom: 0.3rem;"><input type="checkbox" data-filter="stops" value="1"> 1 Stop</label>
                        <label style="display: block; margin-bottom: 0.3rem;"><input type="checkbox" data-filter="stops" value="2"> 2+ Stops</label>
                    </div>

                    <div style="margin-bottom: 1.5rem;">
                        <h4 style="margin-bottom: 0.5rem; font-size: 1rem;">Airlines</h4>
                        <label style="display: block; margin-bottom: 0.3rem;"><input type="checkbox" data-filter="airline" value="Emirates"> Emirates</label>
                        <label style="display: block; margin-bottom: 0.3rem;"><input type="checkbox" data-filter="airline" value="Qatar Airways"> Qatar Airways</label>
                        <label style="display: block; margin-bottom: 0.3rem;"><input type="checkbox" data-filter="airline" value="Singapore Airlines"> Singapore Airlines</label>
                        <label style="display: block; margin-bottom: 0.3rem;"><input type="checkbox" data-filter="airline" value="Etihad"> Etihad</label>
                        <label style="display: block; margin-bottom: 0.3rem;"><input type="checkbox" data-filter="airline" value="Air India"> Air India</label>
                    </div>
                </div>
            </aside>

            <!-- Flights Container -->
            <div id="flights-container">
                <!-- Flights generated by JS -->
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom" style="border-top: none; padding-top: 0">
                <p>&copy; 2026 AeroSky. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="../script.js?v=2"></script>
</body>
</html>
